<div class="sm:px-8 px-4 py-6">
    <div class="max-w-7xl max-lg:max-w-xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-y-12 gap-8">
            <div class="max-w-4xl w-full h-max rounded-md">
                <form>
                    <div>
                        <h2 class="text-xl text-slate-900 font-semibold mb-6">Detalles de entrega</h2>
                        <div class="grid lg:grid-cols-2 gap-y-6 gap-x-4">
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Nombres</label>
                                <input type="text" placeholder="Enter First Name" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Apellidos</label>
                                <input type="text" placeholder="Enter Last Name" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Correo
                                    electrónico</label>
                                <input type="email" placeholder="Enter Email" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Celular</label>
                                <input type="number" placeholder="Enter Phone No." class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Dirección</label>
                                <input type="text" placeholder="Enter Address Line" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Ciudad</label>
                                <input type="text" placeholder="Enter City" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Departamento</label>
                                <input type="text" placeholder="Enter State" class="input" />
                            </div>
                            <div>
                                <label for="" class="text-sm text-slate-900 font-medium block mb-2">Código
                                    postal</label>
                                <input type="text" placeholder="Enter Zip Code" class="input" />
                            </div>
                        </div>
                    </div>


                    <div class="mt-10">
                        <h2 class="text-xl text-slate-900 font-semibold mb-6">Método de pago</h2>

                                <input type="text" placeholder="Enter Cardholder's Name" class="input" />

                            <div>

                        <div class="flex gap-4 max-lg:flex-col mt-8">

                            <button type="button" class="btn btn-block shrink"
                                (click)="backShopping()">Cancelar</button>
                            <button type="button" class="btn btn-block shrink btn-success text-white">Completar
                                compra</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="max-lg:-order-1">
                <h2 class="text-xl text-slate-900 font-semibold mb-6">Order Summary</h2>
                <div class="relative bg-white border border-gray-300 rounded-md">
                    <div class="px-6 py-8 md:overflow-auto">
                        <div class="space-y-4">
                            <div class="flex gap-4 max-sm:flex-col">
                                <div class="w-24 h-24 shrink-0 bg-purple-50 p-2 rounded-md">
                                    <img src='https://readymadeui.com/images/product14.webp' alt="hola"
                                        class="w-full h-full object-contain" />
                                </div>
                                <div class="w-full flex flex-col justify-start md:justify-between md:flex-row gap-4">
                                    <div class="flex flex-col">
                                        <h3 class="text-sm font-medium text-slate-900">{{item()?.name}}</h3>
                                        <p class="text-sm font-medium text-slate-500 mt-2">{{item()?.breed}}</p>
                                        <h6 class="text-[15px] text-slate-900 font-semibold mt-4"> {{
                                            item()?.straw?.price | currency: 'COP' : 'symbol-narrow' : '1.0-0' }} × {{
                                            quantity()
                                            }} pajillas</h6>
                                    </div>
                                    <div class="flex flex-col justify-between items-start gap-4">

                                        <div
                                            class="flex items-center px-2.5 py-1.5 border border-gray-400 text-slate-900 text-xs font-medium outline-0 bg-transparent rounded-md">
                                            <app-quantity-selector [min]="item()?.straw?.minOrder!"
                                                [(quantity)]="quantity" />
                                        </div>

                                    </div>
                                </div>
                            </div>

                        </div>
                        <hr class="border-gray-300 my-6" />
                        <div>
                            <ul class="text-slate-500 font-medium space-y-4">
                                <!-- <li class="flex flex-wrap gap-4 text-sm">
                                    Subtotal
                                    <span class="ml-auto font-semibold text-slate-900"> </span>
                                </li> -->
                                <li class="flex flex-wrap gap-4 text-sm">
                                    Envío <span class="ml-auto font-semibold text-slate-900">
                                        gratis</span>
                                </li>
                                <!-- <li class="flex flex-wrap gap-4 text-sm">Tax <span
                                        class="ml-auto font-semibold text-slate-900">$5.00</span></li> -->
                                <hr class="border-slate-300" />
                                <li class="flex flex-wrap gap-4 text-[15px] font-semibold text-slate-900">Total <span
                                        class="ml-auto">{{ totalPrice() | currency: 'COP'
                                        : 'symbol-narrow' : '1.0-0' }}</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
