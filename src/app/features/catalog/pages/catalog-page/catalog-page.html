<div class="flex flex-col md:flex-row w-full gap-4 py-6">
    <div class="w-full md:w-64 md:shrink-0">
        <app-breed-filter [defaultBreed]="breedFromRoute()!" [breeds]="breeds()!"
            (breedSelected)="onBreedSelected($event)" />
    </div>
    <div class="min-w-0 flex-1">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-4">
            @if(bulls().length>0){
            @for (bull of bulls(); track bull.slug) {
            <app-card [item]="bull" (clickChange)="navigateToDetail($event)" />
            }
            }@else {
            <p>Sin resultados</p>
            }

        </div>
    </div>
</div>
