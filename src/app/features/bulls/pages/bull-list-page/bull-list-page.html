<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold ">Toros </h2>
    <button class="btn btn-success text-white" (click)="newBull()">Nuevo toro</button>

</div>
@if (loading()) {
<div class="flex justify-center items-center h-40">
    <span class="loading loading-spinner loading-lg text-success"></span>
</div>
}
@if(bulls()){
<div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100">
    <table class="table">
        <!-- head -->
        <thead>
            <tr>
                <th>Stud</th>
                <th>Nombre</th>
                <th>Raza</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- row 1 -->
            @for (item of bulls()?.content; track item.id) {
            <tr>
                <th>{{item.stud}}</th>
                <th>{{item.name}}</th>
                <td>{{item.breed.name}}</td>
                <td><button class="btn btn-info text-white" (click)="detail(item.id)">Ver detalles</button></td>
            </tr>
            }
        </tbody>
    </table>
</div>
}
